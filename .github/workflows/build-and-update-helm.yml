name: "CI: Build Image & Update Helm Chart"

on:
  push:
    branches: refactor/prepare-for-ci

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: registry.digitalocean.com/staten
  # github.repository as <account>/<repo>
#  TODO create ${{ github.repository }} and change IMAGE_NAME:${{ github.repository }}
  IMAGE_NAME: upphandlat-mcp

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker Registry Auth
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: doo
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Extract version from pyproject.toml
        run: |
          version=$(grep '^version\s*=' pyproject.toml | sed -E 's/version\s*=\s*"(.*)"/\1/')
          echo "APP_VERSION=${version}" >> $GITHUB_ENV
          echo "Extracted version: ${version}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.APP_VERSION }}
          build-args: |
            GH_TOKEN=${{ secrets.GH_TOKEN }}

      - name: Save version to artifact
        run: |
          echo "${{ env.APP_VERSION }}" > app_version.txt

      - name: Upload version file
        uses: actions/upload-artifact@v4
        with:
          name: app-version
          path: app_version.txt

  update-helm:
    name: Update Helm Chart
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download version file
        uses: actions/download-artifact@v4
        with:
          name: app-version

      - name: Load extracted version
        run: |
          APP_VERSION=$(cat app_version.txt)
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_ENV
      # Use token for https://github.com/staten-platform/staten-argocd-apps
      - name: Checkout Helm chart repository
        uses: actions/checkout@v4
        with:
          repository: staten-platform/staten-argocd-apps
          token: ${{ secrets.STATEN_ARGOCD_APPS_TOKEN }}

      - name: Update Helm chart values
        run: |
          cd helm-upphandlat-mcp
          echo "Updating Helm chart to appVersion=${{ env.APP_VERSION }}"
          sed -i "s/^appVersion:.*/appVersion: \"${{ env.APP_VERSION }}\"/" Chart.yaml

      - name: Configure Git
        run: |
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"

      - name: Commit and push Helm chart changes
        run: |
          git add .
          git commit -m "Update Helm chart to appVersion=${{ env.APP_VERSION }}"
          git push
