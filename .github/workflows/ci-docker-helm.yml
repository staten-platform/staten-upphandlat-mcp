name: "CI Pipeline: Build Docker Image and Update Helm Chart"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: registry.digitalocean.com/staten
  IMAGE_NAME: upphandlat-mcp

jobs:
  setup:
    name: Setup Environment
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.extract_version.outputs.app_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: extract_version
        run: |
          version=$(grep '^version\s*=' pyproject.toml | sed -E 's/version\s*=\s*"(.*)"/\1/')
          echo "::set-output name=app_version::${version}"

  build:
    name: Build and Push Docker Image
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker Registry Auth
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: doo
          password: ${{ secrets.DIGITALOCEAN_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.app_version }}
          build-args: |
            GH_TOKEN=${{ secrets.GH_TOKEN }}

      - name: Save version to artifact
        run: |
          echo "${{ needs.setup.outputs.app_version }}" > app_version.txt

      - name: Upload version file
        uses: actions/upload-artifact@v4
        with:
          name: app-version
          path: app_version.txt

  update-helm:
    name: Update Helm Chart
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download version file
        uses: actions/download-artifact@v4
        with:
          name: app-version

      - name: Load extracted version
        id: load_version
        run: |
          APP_VERSION=$(cat app_version.txt)
          echo "::set-output name=app_version::${APP_VERSION}"

      - name: Checkout Helm chart repository
        uses: actions/checkout@v4
        with:
          repository: staten-platform/staten-argocd-apps
          token: ${{ secrets.STATEN_ARGOCD_APPS_TOKEN }}

      - name: Validate Helm Chart syntax
        run: |
          cd helm-upphandlat-mcp
          helm lint .

      - name: Verify Docker image exists
        run: |
          docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.setup.outputs.app_version }}

      - name: Update Helm chart values
        run: |
          cd helm-upphandlat-mcp
          echo "Updating Helm chart to appVersion=${{ needs.setup.outputs.app_version }}"
          sed -i "s/^appVersion:.*/appVersion: \"${{ needs.setup.outputs.app_version }}\"/" Chart.yaml

      - name: Configure Git
        run: |
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"

      - name: Commit and push Helm chart changes
        run: |
          git add .
          git commit -m "Update Helm chart to appVersion=${{ needs.setup.outputs.app_version }}"
          git push
